<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="1024" height="1024">
  <defs>
    <radialGradient id="body_example_fancy" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#fdfefe" />
      <stop offset="50%" stop-color="#f0f3f4" />
      <stop offset="100%" stop-color="#dfe5e8" />
    </radialGradient>
    
    
    
    

    <radialGradient id="eyeYellow" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffcc" /><stop offset="35%" stop-color="#f5d142" /><stop offset="100%" stop-color="#b38a00" />
    </radialGradient>
    <radialGradient id="eyeCyan" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ccffff" /><stop offset="35%" stop-color="#42e6f5" /><stop offset="100%" stop-color="#0092b3" />
    </radialGradient>
    <radialGradient id="eyeGreen" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ddffcc" /><stop offset="35%" stop-color="#6df542" /><stop offset="100%" stop-color="#1b8a00" />
    </radialGradient>
    <radialGradient id="eyeBlue" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#cce6ff" /><stop offset="35%" stop-color="#4293f5" /><stop offset="100%" stop-color="#0046b3" />
    </radialGradient>
    <radialGradient id="eyeCopper" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffeacc" /><stop offset="35%" stop-color="#f58a42" /><stop offset="100%" stop-color="#a34100" />
    </radialGradient>
    <radialGradient id="eyeHazel" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#efffcc" /><stop offset="35%" stop-color="#baf542" /><stop offset="100%" stop-color="#698500" />
    </radialGradient>
    
    <clipPath id="headClip_example_fancy"><ellipse cx="50" cy="62" rx="38" ry="26" /></clipPath>
  </defs>
  <g transform="translate(0, -2)">
    
    <!-- Ears (Tinted for point breeds) -->
    <path d="M 22,47 Q 15,24 28,24 Q 34,24 40,40" fill="url(#body_example_fancy)" stroke="#1a1a1c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M 78,47 Q 85,24 72,24 Q 66,24 60,40" fill="url(#body_example_fancy)" stroke="#1a1a1c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Head Base -->
    <ellipse cx="50" cy="62" rx="38" ry="26" fill="url(#body_example_fancy)" stroke="#1a1a1c" stroke-width="2.5" />
    
    <!-- Point Faces (Siamese, Ragdoll) -->
    

    <!-- Patterns (Masked to Head) -->
    <g clip-path="url(#headClip_example_fancy)">
  <path d="M 25,38 C 35,32 42,42 38,52 C 32,62 18,52 25,38 Z" fill="#1a1a1c" opacity="0.95"/>
  <path d="M 68,62 C 78,58 85,72 75,82 C 65,88 58,75 68,62 Z" fill="#1a1a1c" opacity="0.95"/>
  <path d="M 60,35 C 68,32 72,38 65,45 C 58,48 52,40 60,35 Z" fill="#1a1a1c" opacity="0.95"/>
</g>
    
    <!-- Inner Head Outline -->
    <ellipse cx="50" cy="61" rx="35" ry="23" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" />
    
    <!-- Left Eye -->
    <circle cx="32" cy="57" r="6.5" fill="url(#eyeYellow)" stroke="#1a1a1c" stroke-width="1.5" />
    <circle cx="30" cy="54.5" r="2.2" fill="#ffffff" />
    <circle cx="34" cy="60" r="1.2" fill="#ffffff" opacity="0.6" />
    
    <!-- Right Eye -->
    <circle cx="68" cy="57" r="6.5" fill="url(#eyeYellow)" stroke="#1a1a1c" stroke-width="1.5" />
    <circle cx="66" cy="54.5" r="2.2" fill="#ffffff" />
    <circle cx="70" cy="60" r="1.2" fill="#ffffff" opacity="0.6" />
    
    <!-- Nose -->
    <ellipse cx="50" cy="64" rx="4" ry="2.5" fill="#3a2a26" />
    <ellipse cx="49.5" cy="63.2" rx="1.5" ry="0.8" fill="#8c7772" />
    
    <!-- Mouth -->
    <path d="M 40,69 Q 50,80 60,69" fill="none" stroke="#1a1a1c" stroke-width="2.5" stroke-linecap="round" />

    <!-- Whiskers -->
    
  <path d="M 25,62 Q 15,64 5,60" fill="none" stroke="#1a1a1c" stroke-width="1.5" stroke-linecap="round" />
  <path d="M 25,68 Q 15,69 5,65" fill="none" stroke="#1a1a1c" stroke-width="1.5" stroke-linecap="round" />
  <path d="M 75,62 Q 85,64 95,60" fill="none" stroke="#1a1a1c" stroke-width="1.5" stroke-linecap="round" />
  <path d="M 75,68 Q 85,69 95,65" fill="none" stroke="#1a1a1c" stroke-width="1.5" stroke-linecap="round" />


    <!-- Accessories -->
    <g transform="translate(50, 82)"><path d="M -4,-1 C -12,-8 -20,-8 -21,0 C -21,8 -12,10 -5,5 Z" fill="#f5a623" stroke="#1a1a1c" stroke-width="1.8" stroke-linejoin="round" /><path d="M 4,-1 C 12,-8 20,-8 21,0 C 21,8 12,10 5,5 Z" fill="#f5a623" stroke="#1a1a1c" stroke-width="1.8" stroke-linejoin="round" /><circle cx="0" cy="1" r="4.2" fill="#e67e22" stroke="#1a1a1c" stroke-width="1.8" /><path d="M -5,5 L -12,24 L -4,20 L -1,8 Z" fill="#f39c12" stroke="#1a1a1c" stroke-width="1.5" stroke-linejoin="round" /><path d="M 5,5 L 12,24 L 4,20 L 1,8 Z" fill="#f39c12" stroke="#1a1a1c" stroke-width="1.5" stroke-linejoin="round" /></g><g transform="translate(18, 42)"><circle cx="0" cy="4" r="3" fill="none" stroke="#f1c40f" stroke-width="2"/><path d="M 0,7 L -2,12 L 0,15 L 2,12 Z" fill="#9b59b6" stroke="#1a1a1c" stroke-width="1"/></g><g transform="translate(29, 31) rotate(-18)"><path d="M -1,-1 C -10,-10 -18,-9 -17,0 C -16,8 -8,8 -1,2 Z" fill="#e74c3c" stroke="#1a1a1c" stroke-width="2" stroke-linejoin="round" /><path d="M 1,-1 C 7,-8 14,-8 18,-2 C 14,2 8,4 1,2 Z" fill="#e74c3c" stroke="#1a1a1c" stroke-width="2" stroke-linejoin="round" /><ellipse cx="0" cy="0" rx="4.2" ry="3.6" fill="#c0392b" stroke="#1a1a1c" stroke-width="2" /><path d="M -13,-5 L -19,-11" stroke="#1a1a1c" stroke-width="1.5" stroke-linecap="round" opacity="0.35" /></g>
  </g>
