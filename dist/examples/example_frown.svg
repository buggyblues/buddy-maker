  <g transform="translate(0, -2)">
    
    <!-- Ears (Tinted for point breeds) -->
    <path d="M 22,47 Q 15,24 28,24 Q 34,24 40,40" fill="url(#body_example_frown)" stroke="#1a1a1c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M 78,47 Q 85,24 72,24 Q 66,24 60,40" fill="url(#body_example_frown)" stroke="#1a1a1c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    
