      <stop offset="100%" stop-color="#63717d" />
    </radialGradient>
    
    
    
    <radialGradient id="customEyeL_example_frown" cx="35%" cy="35%" r="65%"><stop offset="0%" stop-color="#ff444433" /><stop offset="35%" stop-color="#ff4444" /><stop offset="100%" stop-color="#ff4444ff" /></radialGradient><radialGradient id="customEyeR_example_frown" cx="35%" cy="35%" r="65%"><stop offset="0%" stop-color="#ff444433" /><stop offset="35%" stop-color="#ff4444" /><stop offset="100%" stop-color="#ff4444ff" /></radialGradient>

